version: '3.8'

services:
  sidecar:
    build:
      context: .
      dockerfile: services/sidecar/Dockerfile
    container_name: ebay-sidecar
    restart: unless-stopped
    env_file:
      - services/sidecar/.env
    ports:
      - '3000:3000'
    healthcheck:
      test: ['CMD', 'node', '-e', 'process.exit(0)']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./logs:/app/logs
    networks:
      - backend-services-network

networks:
  backend-services-network:
    driver: bridge
